<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Anton&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/base/variables.css" />
    <link rel="stylesheet" href="css/base/typography.css" />
    <link rel="stylesheet" href="css/base/layout.css" />

    <link rel="stylesheet" href="css/components/buttons.css" />
    <link rel="stylesheet" href="css/components/zone.css" />

    <link rel="stylesheet" href="css/pages/app/layout.css" />
    <link rel="stylesheet" href="css/pages/app/zones.css" />
    <link rel="stylesheet" href="css/pages/app/click.css" />
    <link rel="stylesheet" href="css/pages/app/header.css" />
    <link rel="stylesheet" href="css/pages/app/shop.css" />

    <title>Viva Bolsonaro v2.0</title>
  </head>
  <body>
    <header class="header">
      <nav class="nav"></nav>
    </header>

    <main class="game">
      <h1 class="title">Bolsonaro mereçe justiça!!</h1>

      <div class="zones">
        <section class="zone zone--click">
          <h2 class="title">Ajude o bolsonaro!</h2>

          <div class="content-group">
            <div class="stats">
              <p class="text">
                Ajudas por click:
                <span class="emphasis income-click-value"></span>
              </p>

              <p class="text">
                Ajudas por segundo:
                <span class="emphasis income-idle-value"></span>
              </p>
            </div>

            <img class="image" src="content/SadBolsonaro.jpg" />

            <p class="text">Clique no botão para soltar bolsonaro da prisão:</p>
          </div>

          <button type="button" class="button title click-button">
            Ajude o bolsonaro!!
          </button>

          <p class="text">
            Bolsonaro foi ajudado
            <span class="emphasis counter-value"></span>
            vezes
          </p>
        </section>

        <section class="zone zone--shop"></section>
      </div>
    </main>

    <script type="importmap">
      {
        "imports": {
          "@utils/": "/js/utils/",
          "@server/": "/js/server/",

          "@services/": "/js/server/services/",

          "@appPage/": "/js/pages/app/",
          "@loginPage/": "/js/pages/login/",
          "@signupPage/": "/js/pages/signup/",

          "@appGame/": "/js/pages/app/game/",
          "@appUI/": "/js/pages/app/ui/"
        }
      }
    </script>
    <script type="module" src="js/server/debug.js"></script>
    <script type="module" src="js/pages/app/app.js"></script>
  </body>
</html>
