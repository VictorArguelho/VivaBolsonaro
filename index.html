<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/game.css" />
    <link rel="stylesheet" href="css/button.css" />
    <link rel="stylesheet" href="css/zones.css" />
    <link rel="stylesheet" href="css/click-zone.css" />
    <link rel="stylesheet" href="css/shop-zone.css" />
    <title>Viva Bolsonaro v0.2</title>
  </head>
  <body>
    <main class="game">
      <h1 id="game-title">BOLSONARO MERECE JUSTIÇA!!</h1>

      <div class="zones">
        <section class="zone" data-zone="click">
          <h2 class="zone-title">AJUDE O BOLSONARO!</h2>

          <div class="stats">
            <p id="points-per-click">Ajudas por click: <strong class="value">1</strong></p>
            <p id="points-per-second">Ajudas por segundo: <strong class="value">0</strong></p>
          </div>

          <img id="click-image" src="content/SadBolsonaro.jpg"/>
          <p id="click-text">Clique no botão para soltar bolsonaro da prisão:</p>
          <button type="button" id="click-button">Ajude o Bolsonaro!!</button>
          <p id="click-count">Bolsonaro foi ajudado <strong class="value">0</strong> vezes</p>
        </section>

        <section class="zone" data-zone="shop">
          <h2 class="zone-title">LOJA</h2>

          <button class="upgrade" data-upgrade="1" type="button">
            <h3 class="upgrade-title">Upgrade 01</h3>
            <div class="upgrade-info">
              <div>
                <span>Ajudas por clique: </span>
                <strong class="points-per-click">+1</strong>
              </div>
              <div>
                <span>Ajudas por segundo: </span>
                <strong class="points-per-second">+0</strong>
              </div>
              <div>
                <span>Custo: </span>
                <strong class="cost">10</strong>
              </div>
            </div>
          </button>
          
        </section>
      </div>
    </main>

    <script type="module" src="js/script.js"></script>
  </body>
</html>
